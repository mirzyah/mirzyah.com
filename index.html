<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRZYAH</title>
  <meta name="description" content="We are just the inn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Poppins:wght@300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #080808;
      --gold: #A8874A;
      --white: #FFFFFF;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--black);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Fade in entire page */
    body {
      animation: fadeIn 0.8s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── NAVIGATION ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
    }

    .nav-star {
      font-size: 14px;
      color: #A8874A;
      user-select: none;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 40px;
      list-style: none;
    }

    .nav-links li {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: rgba(255, 255, 255, 0.38);
      text-transform: uppercase;
      cursor: default;
      user-select: none;
      transition: none;
      position: relative;
    }

    .nav-links li:hover {
      color: rgba(255, 255, 255, 0.68);
    }

    .nav-links li .nav-label-default {
      display: inline;
    }

    .nav-links li .nav-label-hover {
      display: none;
    }

    .nav-links li:not(.nav-link):hover .nav-label-default {
      display: none;
    }

    .nav-links li:not(.nav-link):hover .nav-label-hover {
      display: inline;
    }

    .nav-links li a {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-links li.nav-link:hover {
      color: rgba(255, 255, 255, 0.90);
    }

    /* ── HERO ── */
    main {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }

    .logo-mark {
      width: 110px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* ── CRESCENT MOON ──
       The occluder is a black disk over the gold disk; where it covers, the
       disk reads as page background, carving the crescent. At rest it leaves
       a thin ~14px sliver matching the original. On hover it slides right only
       slightly, so the crescent thickens a touch without the gold climbing up
       toward the horns. The M always stays on shadow. */
    .moon-occluder {
      transform: translateX(14px);
      transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-mark:hover .moon-occluder {
      transform: translateX(24px);
    }

    .wordmark {
      margin-top: 28px;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: 0.55em;
      color: rgba(255, 255, 255, 1.0);
      text-transform: uppercase;
      /* Compensate for letter-spacing on last character */
      text-indent: 0.55em;
    }

    .divider {
      margin: 52px auto;
      width: 1px;
      height: 40px;
      background-color: rgba(255, 255, 255, 0.14);
    }

    .cta-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.32em;
      color: rgba(255, 255, 255, 0.28);
      text-transform: uppercase;
      text-indent: 0.32em;
      margin-bottom: 10px;
    }

    .cta-email {
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.68);
      text-decoration: none;
      text-transform: lowercase;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .cta-email:hover {
      color: rgba(255, 255, 255, 0.90);
      border-bottom-color: rgba(255, 255, 255, 0.28);
    }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 0 28px 0;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 0.28em;
      color: rgba(255, 255, 255, 0.22);
      text-transform: uppercase;
      text-indent: 0.28em;
      user-select: none;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      nav {
        padding: 22px 24px;
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links li {
        font-size: 9px;
        letter-spacing: 0.18em;
      }

      .logo-mark {
        width: 76px;
      }

      .wordmark {
        font-size: 20px;
        letter-spacing: 0.45em;
        text-indent: 0.45em;
        margin-top: 22px;
      }

      .divider {
        margin: 40px auto;
      }
    }

    /* Reduced motion — hold a static thin crescent, no waxing on hover */
    @media (prefers-reduced-motion: reduce) {
      body {
        animation: none;
        opacity: 1;
      }
      .moon-occluder {
        transition: none;
      }
      .logo-mark:hover .moon-occluder {
        transform: translateX(14px);
      }
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <span class="nav-star">✦</span>
    <ul class="nav-links">
      <li class="nav-link">
        <a href="about.html">About</a>
      </li>
      <li>
        <span class="nav-label-default">The Vault</span>
        <span class="nav-label-hover">Locked</span>
      </li>
      <li>
        <span class="nav-label-default">Isnad</span>
        <span class="nav-label-hover">Locked</span>
      </li>
      <li>
        <span class="nav-label-default">Gear</span>
        <span class="nav-label-hover">Locked</span>
      </li>
    </ul>
  </nav>

  <!-- HERO -->
  <main>

    <!-- Crescented M — disk + occluder construction.
         Hover wakes the moon: the lit body thickens slightly, and a single
         sparkle rises up the open right side, from bottom-right to top.
         The sparkle plays through once and cannot restart until it finishes. -->
    <svg
      id="logoMark"
      class="logo-mark"
      viewBox="0 0 200 200"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="Mirzyah Crescented M mark"
      role="img"
    >
      <!-- The lit disk -->
      <circle cx="100" cy="100" r="82" fill="#A8874A" />

      <!-- The occluder — page-black disk that carves the crescent.
           Slides right on hover to wax the moon slightly. -->
      <g class="moon-occluder">
        <circle cx="100" cy="100" r="82" fill="#080808" />
      </g>

      <!-- M letterform — always gold, always in front, seated in the opening -->
      <text
        x="116"
        y="128"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="78"
        font-weight="400"
        fill="#A8874A"
        letter-spacing="0"
      >M</text>

      <!-- Sparkle. animateMotion carries its centre from the bottom-right of
           the moon, out toward the right rim, up to the top — on the dark side,
           right of the M, the whole way. restart="whenNotActive" locks it: once
           it is running, re-hovering will not restart it until it completes. -->
      <path
        d="M0,-9 L1.9,-1.9 L9,0 L1.9,1.9 L0,9 L-1.9,1.9 L-9,0 L-1.9,-1.9 Z"
        fill="#A8874A"
        opacity="0"
      >
        <animateMotion
          begin="hit.mouseover"
          dur="1.8s"
          fill="remove"
          restart="whenNotActive"
          rotate="0"
          calcMode="spline"
          keyTimes="0;1"
          keySplines="0.4 0 0.2 1"
          path="M148,172 C180,150 180,50 148,28" />
        <animate
          attributeName="opacity"
          begin="hit.mouseover"
          dur="1.8s"
          values="0;1;1;0"
          keyTimes="0;0.18;0.72;1"
          fill="remove"
          restart="whenNotActive" />
      </path>

      <!-- Single transparent hit target so hover fires once on enter,
           not repeatedly as the cursor crosses sub-elements. -->
      <rect id="hit" x="0" y="0" width="200" height="200" fill="none" pointer-events="all" />
    </svg>

    <p class="wordmark">Mirzyah</p>

    <div class="divider"></div>

    <p class="cta-label">Write to us</p>
    <a class="cta-email" href="mailto:archive@mirzyah.com">archive@mirzyah.com</a>

  </main>

  <!-- FOOTER -->
  <footer>
    ✦ &nbsp;·&nbsp; Ontario, Canada &nbsp;·&nbsp; Est. 2026 &nbsp;·&nbsp; mirzyah.com
  </footer>

</body>
</html>
